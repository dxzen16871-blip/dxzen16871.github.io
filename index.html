<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>按揭贷款计算器</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(160deg, #e8eef3 0%, #d5dce6 50%, #c2cfe0 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 1px 3px rgba(0,0,0,0.06);
      max-width: 540px;
      width: 100%;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #1a5276, #2471a3, #2e86c1);
      color: #fff;
      padding: 28px 32px 24px;
      text-align: center;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    .header p {
      font-size: 13px;
      opacity: 0.75;
      margin-top: 6px;
    }
    .body { padding: 28px 32px 20px; }
    .field { margin-bottom: 20px; }
    .field label {
      display: flex;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 8px;
    }
    .field label .icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .icon-blue  { background: #d6eaf8; color: #2471a3; }
    .icon-green { background: #d5f5e3; color: #1e8449; }
    .icon-orange{ background: #fdebd0; color: #d35400; }
    .icon-purple{ background: #e8daef; color: #7d3c98; }
    .field input[type=number], .field select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e4eaef;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      background: #fafbfc;
      color: #2c3e50;
    }
    .field input:focus, .field select:focus {
      border-color: #2471a3;
      box-shadow: 0 0 0 3px rgba(36,113,163,0.10);
      background: #fff;
    }
    .range-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .range-row input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #2471a3, #2e86c1);
      outline: none;
    }
    .range-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #2471a3;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(36,113,163,0.35);
    }
    .range-val {
      min-width: 56px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: #1a5276;
      background: #d6eaf8;
      padding: 6px 10px;
      border-radius: 8px;
    }
    .method-row {
      display: flex;
      gap: 10px;
    }
    .method-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #e4eaef;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      background: #fafbfc;
      color: #5a6d7d;
    }
    .method-btn.active {
      border-color: #2471a3;
      background: #d6eaf8;
      color: #1a5276;
    }
    .method-btn:hover:not(.active) {
      border-color: #a9cce3;
      background: #f0f7fa;
    }
    .calc-btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 24px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #1a5276, #2471a3);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .calc-btn:hover { opacity: 0.92; }
    .calc-btn:active { transform: scale(0.985); }

    /* ---- Result Panel ---- */
    .result-panel {
      display: none;
      padding: 0 32px 28px;
    }
    .result-panel.show { display: block; }
    .result-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #d5dce6, transparent);
      margin-bottom: 20px;
    }
    .result-title {
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      color: #1a5276;
      margin-bottom: 18px;
    }
    .summary-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .s-card {
      background: linear-gradient(135deg, #f7f9fb, #edf2f7);
      border-radius: 12px;
      padding: 14px 16px;
      border: 1px solid #e1e8ef;
    }
    .s-card .sl { font-size: 12px; color: #6b7d8d; margin-bottom: 4px; }
    .s-card .sv { font-size: 20px; font-weight: 700; color: #1a5276; }
    .s-card .sv small { font-size: 13px; font-weight: 400; color: #6b7d8d; }
    .s-card.highlight {
      background: linear-gradient(135deg, #fef9e7, #fdebd0);
      border-color: #f9e79f;
    }
    .s-card.highlight .sv { color: #b7950b; }
    .s-card.highlight2 {
      background: linear-gradient(135deg, #fdedec, #fadbd8);
      border-color: #f5b7b1;
    }
    .s-card.highlight2 .sv { color: #c0392b; }

    /* Donut chart */
    .chart-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-bottom: 16px;
    }
    .donut-wrap {
      width: 130px; height: 130px;
      position: relative;
    }
    .donut-wrap svg { width: 130px; height: 130px; }
    .donut-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      text-align: center;
      font-size: 13px;
      color: #6b7d8d;
    }
    .donut-center strong { display: block; font-size: 16px; color: #1a5276; }
    .legend { font-size: 13px; color: #5a6d7d; }
    .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Table */
    .tbl-toggle {
      text-align: center;
    }
    .tbl-toggle button {
      background: none;
      border: 2px solid #d5dce6;
      border-radius: 10px;
      padding: 8px 24px;
      font-size: 13px;
      font-weight: 600;
      color: #2471a3;
      cursor: pointer;
      transition: all .2s;
    }
    .tbl-toggle button:hover { background: #d6eaf8; }
    .tbl-wrap {
      margin-top: 14px;
      max-height: 360px;
      overflow-y: auto;
      border-radius: 10px;
      border: 1px solid #e1e8ef;
    }
    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    thead th {
      background: #edf2f7;
      color: #2c3e50;
      padding: 10px 8px;
      position: sticky;
      top: 0;
      z-index: 1;
      border-bottom: 2px solid #d5dce6;
    }
    thead th:first-child { text-align: center; }
    tbody td {
      padding: 8px;
      text-align: right;
      border-bottom: 1px solid #edf2f7;
      color: #3a5060;
    }
    tbody td:first-child { text-align: center; font-weight: 600; color: #1a5276; }
    tbody tr:hover { background: #f7f9fb; }
    tfoot td {
      padding: 10px 8px;
      text-align: right;
      font-weight: 700;
      color: #1a5276;
      border-top: 2px solid #d5dce6;
      background: #f7f9fb;
    }
    tfoot td:first-child { text-align: center; }

    .error-msg {
      display: none;
      background: #fdedec;
      border: 1px solid #f5b7b1;
      color: #c0392b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 16px;
      text-align: center;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>🏠 按揭贷款计算器</h1>
      <p>输入贷款信息，一键计算月供与总利息</p>
    </div>

    <div class="body">
      <div class="field">
        <label><span class="icon icon-blue">💰</span>贷款总额</label>
        <input type="number" id="principal" value="100" min="1" max="10000" step="1" placeholder="请输入贷款总额（万元）">
      </div>

      <div class="field">
        <label><span class="icon icon-green">📊</span>年利率</label>
        <input type="number" id="rate" value="3.85" min="0.01" max="30" step="0.01" placeholder="请输入年利率（%）">
      </div>

      <div class="field">
        <label><span class="icon icon-orange">📅</span>贷款期限</label>
        <div class="range-row">
          <input type="range" id="yearsSlider" min="1" max="30" value="30">
          <div class="range-val" id="yearsVal">30 <small>年</small></div>
        </div>
      </div>

      <div class="field">
        <label><span class="icon icon-purple">🔄</span>还款方式</label>
        <div class="method-row">
          <div class="method-btn active" data-method="equal_payment" onclick="setMethod('equal_payment',this)">等额本息</div>
          <div class="method-btn" data-method="equal_principal" onclick="setMethod('equal_principal',this)">等额本金</div>
        </div>
      </div>

      <button class="calc-btn" onclick="calc()">开 始 计 算</button>
      <div class="error-msg" id="errMsg"></div>
    </div>

    <div class="result-panel" id="resultPanel">
      <div class="result-divider"></div>
      <div class="result-title">📋 计算结果</div>

      <div class="summary-cards">
        <div class="s-card">
          <div class="sl">每月还款</div>
          <div class="sv" id="r_month">-</div>
        </div>
        <div class="s-card highlight">
          <div class="sl">还款总额</div>
          <div class="sv" id="r_total">-</div>
        </div>
        <div class="s-card highlight2">
          <div class="sl">支付利息</div>
          <div class="sv" id="r_interest">-</div>
        </div>
        <div class="s-card">
          <div class="sl">还款总期数</div>
          <div class="sv" id="r_months">-</div>
        </div>
      </div>

      <div class="chart-row">
        <div class="donut-wrap">
          <svg viewBox="0 0 42 42">
            <circle cx="21" cy="21" r="15.91549430918954" fill="none" stroke="#e4eaf0" stroke-width="4"/>
            <circle id="donutPrin" cx="21" cy="21" r="15.91549430918954" fill="none" stroke="#2471a3" stroke-width="4" stroke-dasharray="0 100" stroke-dashoffset="25" stroke-linecap="round"/>
            <circle id="donutInt" cx="21" cy="21" r="15.91549430918954" fill="none" stroke="#e67e22" stroke-width="4" stroke-dasharray="0 100" stroke-dashoffset="25" stroke-linecap="round"/>
          </svg>
          <div class="donut-center"><strong>占比</strong>本金 vs 利息</div>
        </div>
        <div class="legend">
          <div class="legend-item"><span class="legend-dot" style="background:#2471a3"></span> 贷款本金</div>
          <div class="legend-item"><span class="legend-dot" style="background:#e67e22"></span> 支付利息</div>
          <div class="legend-item"><span class="legend-dot" style="background:#e4eaf0"></span> 未覆盖区域</div>
        </div>
      </div>

      <div class="tbl-toggle">
        <button id="tblBtn" onclick="toggleTable()">📄 展开还款明细</button>
      </div>
      <div id="tblArea" style="display:none;">
        <div class="tbl-wrap">
          <table id="tbl">
            <thead><tr><th>期数</th><th>月还款(万)</th><th>还本(万)</th><th>还息(万)</th><th>剩余(万)</th></tr></thead>
            <tbody></tbody>
            <tfoot><tr><td>合计</td><td id="ft_pay"></td><td id="ft_prin"></td><td id="ft_int"></td><td>-</td></tr></tfoot>
          </table>
        </div>
      </div>
    </div>
  </div>

<script>
let currentMethod = 'equal_payment';

function setMethod(m, el){
  currentMethod = m;
  document.querySelectorAll('.method-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

// 年限滑块联动
const slider = document.getElementById('yearsSlider');
const valDiv = document.getElementById('yearsVal');
slider.addEventListener('input', ()=>{ valDiv.innerHTML = slider.value + ' <small>年</small>'; });

function fmt2(n){ return n.toFixed(2); }
function fmtWan(n){ return (n/10000).toFixed(2); }

function showError(msg){
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('resultPanel').classList.remove('show');
}

function calc(){
  document.getElementById('errMsg').classList.remove('show');
  const Pwan = parseFloat(document.getElementById('principal').value);
  const rate = parseFloat(document.getElementById('rate').value);
  const Y    = parseInt(document.getElementById('yearsSlider').value);

  if(!Pwan || Pwan<=0 || isNaN(Pwan)){ showError('请输入有效的贷款总额（万元）'); return; }
  if(!rate || rate<=0 || isNaN(rate)){ showError('请输入有效的年利率（%）'); return; }
  if(!Y || Y<1 || Y>30){ showError('贷款期限为 1-30 年'); return; }

  const P = Pwan * 10000;
  const r = rate / 100 / 12;
  const n = Y * 12;

  let schedule = [];
  let totalInterest = 0;
  let firstMonth = 0, lastMonth = 0;

  if(currentMethod === 'equal_payment'){
    // 等额本息
    const M = P * r * Math.pow(1+r,n) / (Math.pow(1+r,n)-1);
    let remain = P;
    for(let i=1;i<=n;i++){
      const intPay = remain * r;
      const prinPay = M - intPay;
      remain -= prinPay;
      if(i===1) firstMonth = M;
      totalInterest += intPay;
      schedule.push({month:i, payment:M, principal:prinPay, interest:intPay, remain:Math.max(remain,0)});
    }
    lastMonth = firstMonth;
  } else {
    // 等额本金
    const prinPay = P / n;
    let remain = P;
    for(let i=1;i<=n;i++){
      const intPay = remain * r;
      const M = prinPay + intPay;
      remain -= prinPay;
      if(i===1) firstMonth = M;
      lastMonth = M;
      totalInterest += intPay;
      schedule.push({month:i, payment:M, principal:prinPay, interest:intPay, remain:Math.max(remain,0)});
    }
  }

  const total = P + totalInterest;

  // 更新结果卡片
  if(currentMethod==='equal_payment'){
    document.getElementById('r_month').innerHTML = fmt2(firstMonth) + ' 元';
  } else {
    document.getElementById('r_month').innerHTML = fmt2(firstMonth)+' ~ '+fmt2(lastMonth)+' 元';
  }
  document.getElementById('r_total').innerHTML = fmt2(total) + ' 元';
  document.getElementById('r_interest').innerHTML = fmt2(totalInterest) + ' 元';
  document.getElementById('r_months').textContent = n + ' 期 (' + Y + ' 年)';

  // 甜甜圈占比
  const pctPrin = P / total * 100;
  const pctInt  = totalInterest / total * 100;
  document.getElementById('donutPrin').setAttribute('stroke-dasharray', pctPrin+' '+ (100-pctPrin));
  document.getElementById('donutInt').setAttribute('stroke-dasharray', pctInt+' '+(100-pctInt));
  document.getElementById('donutInt').setAttribute('stroke-dashoffset', (25 - pctPrin));

  // 表格
  const tbody = document.querySelector('#tbl tbody');
  tbody.innerHTML = '';
  let sumPay=0, sumPrin=0, sumInt=0;
  for(const s of schedule){
    sumPay += s.payment;
    sumPrin += s.principal;
    sumInt  += s.interest;
    const tr = document.createElement('tr');
    tr.innerHTML = '<td>'+s.month+'</td><td>'+fmtWan(s.payment)+'</td><td>'+fmtWan(s.principal)+'</td><td>'+fmtWan(s.interest)+'</td><td>'+fmtWan(s.remain)+'</td>';
    tbody.appendChild(tr);
  }
  document.getElementById('ft_pay').textContent = fmtWan(sumPay);
  document.getElementById('ft_prin').textContent = fmtWan(sumPrin);
  document.getElementById('ft_int').textContent  = fmtWan(sumInt);

  // 显示结果面板
  document.getElementById('resultPanel').classList.add('show');
  document.getElementById('tblArea').style.display = 'none';
  document.getElementById('tblBtn').textContent = '📄 展开还款明细';
}

function toggleTable(){
  const area = document.getElementById('tblArea');
  const btn  = document.getElementById('tblBtn');
  if(area.style.display==='none'){
    area.style.display = 'block';
    btn.textContent = '📄 收起还款明细';
  } else {
    area.style.display = 'none';
    btn.textContent = '📄 展开还款明细';
  }
}

// 页面加载自动算一次
calc();
</script>
</body>
</html>
